# Supabase CLI project config (https://supabase.com/docs/guides/local-development/cli/config)
project_id = "pops-villepinte"

[db]
major_version = 15

[auth]
enable_signup = true
# SMS OTP is now handled by Prelude (https://prelude.so). The API verifies the
# code, then provisions/signs-in the Supabase user via the admin client. The
# built-in Supabase SMS provider is intentionally disabled here so we never
# accidentally double-send. Disable the SMS provider in the Supabase dashboard
# (Auth → Providers → Phone) for the hosted project as well.
[auth.sms]
enable_signup = false
enable_confirmations = false

[storage]
file_size_limit = "5MiB"
